<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nokius.github.io ~ terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #39ff14;
      --dim:    #1a7a0a;
      --bg:     #0a0a0a;
      --panel:  #0f1a0f;
      --border: #1e3a1e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,.18) 3px,
        rgba(0,0,0,.18) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* subtle vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.7) 100%);
      pointer-events: none;
      z-index: 998;
    }

    /* ── layout ── */
    .window {
      max-width: 860px;
      margin: 40px auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(57,255,20,.08), 0 0 2px rgba(57,255,20,.25);
    }

    /* title-bar */
    .titlebar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .titlebar-label {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: var(--dim);
      letter-spacing: .08em;
    }

    /* terminal body */
    .term {
      background: var(--bg);
      padding: 22px 26px 30px;
      min-height: 420px;
    }

    /* ── output lines ── */
    .line { white-space: pre-wrap; word-break: break-word; }
    .line.prompt::before { content: 'nokius.github.io:~$ '; color: var(--dim); }
    .line.comment { color: var(--dim); }
    .line.head    { color: var(--green); font-weight: bold; letter-spacing: .04em; }
    .line.gap     { display: block; height: .9em; }
    .line.link a  { color: var(--green); text-decoration: underline; }
    .line.link a:hover { color: #fff; }

    /* ASCII art */
    .ascii {
      color: var(--green);
      font-size: 13px;
      line-height: 1.25;
      margin-bottom: 18px;
      opacity: .85;
    }

    /* blinking cursor */
    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── interactive input ── */
    .input-row {
      display: flex;
      align-items: center;
      margin-top: 14px;
    }
    .input-row .ps1 { color: var(--dim); white-space: nowrap; margin-right: 6px; }
    #cmd {
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font: inherit;
      flex: 1;
      caret-color: var(--green);
    }

    /* ── history output ── */
    #history .line { animation: fadein .15s ease; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

    /* ── help table ── */
    .cmd-table { border-collapse: collapse; margin: 4px 0; }
    .cmd-table td { padding: 1px 20px 1px 0; color: var(--green); }
    .cmd-table td:first-child { color: var(--dim); }

    /* mobile */
    @media (max-width: 600px) {
      .window { margin: 10px; }
      .ascii { font-size: 9px; }
      html, body { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <span class="titlebar-label">nokius.github.io — bash — 80×24</span>
  </div>

  <div class="term">
    <!-- ASCII logo -->
    <pre class="ascii">
  _ __   ___ | | _(_)_   _ ___
 | '_ \ / _ \| |/ / | | | / __|
 | | | | (_) |   <| | |_| \__ \
 |_| |_|\___/|_|\_\_|\__,_|___/
    </pre>

    <!-- boot sequence (typed in by JS) -->
    <div id="boot"></div>

    <!-- interactive history -->
    <div id="history"></div>

    <!-- prompt -->
    <div class="input-row" id="prompt-row" style="display:none">
      <span class="ps1">nokius.github.io:~$&nbsp;</span>
      <input id="cmd" type="text" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false" autofocus />
    </div>
  </div>
</div>

<script>
// ── boot lines ──────────────────────────────────────────────────────────────
const BOOT = [
  { cls: 'comment', text: '# nokius.github.io terminal v1.0  —  type `help` to see commands' },
  { cls: 'gap',     text: '' },
  { cls: 'prompt',  text: 'uname -a' },
  { cls: 'line',    text: 'Linux nokius 6.x #1 SMP GNU/Linux' },
  { cls: 'prompt',  text: 'whoami' },
  { cls: 'line',    text: 'nokius' },
  { cls: 'prompt',  text: 'uptime' },
  { cls: 'line',    text: 'up forever, load avg: hacking, building, exploring' },
  { cls: 'gap',     text: '' },
];

// ── command registry ────────────────────────────────────────────────────────
const COMMANDS = {
  help() {
    return {
      type: 'table',
      data: [
        { cmd: 'about', desc: 'who is nokius?' },
        { cmd: 'skills', desc: 'tech stack & tools' },
        { cmd: 'projects', desc: 'things I built' },
        { cmd: 'contact', desc: 'get in touch' },
        { cmd: 'clear', desc: 'clear the terminal' },
        { cmd: 'matrix', desc: 'a little fun' }
      ]
    };
  },

  about() {
    return {
      type: 'lines',
      data: [
        'Hey! I\'m nokius — tinkerer, open-source enthusiast,',
        'and all-around curious hacker.',
        '',
        'I enjoy low-level hacking, mobile Linux, and breaking',
        'things just to learn how they work.'
      ]
    };
  },

  skills() {
    return {
      type: 'lines',
      data: [
        'Languages  :  C · Python · Shell · JavaScript',
        'Platforms  :  Linux · Android/AOSP · Sailfish OS',
        'Tools      :  Git · Docker · GDB · Vim',
        'Interests  :  Reverse engineering · embedded systems'
      ]
    };
  },

  projects() {
    return {
      type: 'links',
      data: [
        { text: '★ github.com/nokius  — all public repos', url: 'https://github.com/nokius' },
        { text: '  Sailfish OS ports, kernel patches, tooling experiments…', url: null }
      ]
    };
  },

  contact() {
    return {
      type: 'links',
      data: [
        { text: 'github.com/nokius', url: 'https://github.com/nokius' }
      ]
    };
  },

  clear() {
    return null;
  },

  matrix() {
    startMatrix();
    return {
      type: 'lines',
      data: ['Entering the matrix…  (press any key to exit)']
    };
  },
};

// ── helpers ─────────────────────────────────────────────────────────────────
function renderOutput(output) {
  if (!output) return null;
  
  const container = document.createElement('div');
  
  if (output.type === 'lines') {
    output.data.forEach(line => {
      const lineEl = document.createElement('div');
      lineEl.className = 'line';
      lineEl.textContent = line;
      container.appendChild(lineEl);
    });
  } else if (output.type === 'links') {
    output.data.forEach(item => {
      const lineEl = document.createElement('span');
      lineEl.className = 'line';
      if (item.url) {
        lineEl.className += ' link';
        const link = document.createElement('a');
        link.href = item.url;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = item.text;
        lineEl.appendChild(link);
      } else {
        lineEl.textContent = item.text;
      }
      container.appendChild(lineEl);
    });
  } else if (output.type === 'table') {
    const table = document.createElement('table');
    table.className = 'cmd-table';
    output.data.forEach(row => {
      const tr = document.createElement('tr');
      const td1 = document.createElement('td');
      const td2 = document.createElement('td');
      td1.textContent = row.cmd;
      td2.textContent = row.desc;
      tr.appendChild(td1);
      tr.appendChild(td2);
      table.appendChild(tr);
    });
    container.appendChild(table);
  }
  
  return container;
}

// ── boot animation ───────────────────────────────────────────────────────────
const bootEl = document.getElementById('boot');
let bi = 0;
function typeBootLine() {
  if (bi >= BOOT.length) {
    document.getElementById('prompt-row').style.display = 'flex';
    document.getElementById('cmd').focus();
    return;
  }
  const { cls, text } = BOOT[bi++];
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.textContent = text;
  bootEl.appendChild(d);
  setTimeout(typeBootLine, 80);
}
setTimeout(typeBootLine, 400);

// ── command execution ────────────────────────────────────────────────────────
const history = document.getElementById('history');
const cmdInput = document.getElementById('cmd');
const cmdHistory = [];
let histIdx = -1;

cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const raw = cmdInput.value.trim();
    cmdInput.value = '';
    histIdx = -1;
    if (!raw) return;
    cmdHistory.unshift(raw);

    // echo prompt
    const echo = document.createElement('div');
    echo.className = 'line prompt';
    echo.textContent = raw;
    history.appendChild(echo);

    const fn = COMMANDS[raw.toLowerCase()];
    if (fn) {
      const out = fn();
      if (out) {
        const rendered = renderOutput(out);
        if (rendered) {
          history.appendChild(rendered);
        }
      }
    } else {
      const err = document.createElement('div');
      err.className = 'line';
      err.textContent = `bash: ${raw}: command not found  (try \`help\`)`;
      history.appendChild(err);
    }

    // gap after each command
    const gap = document.createElement('div');
    gap.className = 'line gap';
    history.appendChild(gap);

    window.scrollTo(0, document.body.scrollHeight);
  }

  // history nav
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) histIdx++;
    cmdInput.value = cmdHistory[histIdx] || '';
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) histIdx--;
    else { histIdx = -1; cmdInput.value = ''; return; }
    cmdInput.value = cmdHistory[histIdx] || '';
  }
});

// re-focus input on click anywhere in terminal
document.querySelector('.term').addEventListener('click', () => cmdInput.focus());

// ── matrix easter egg ────────────────────────────────────────────────────────
function startMatrix() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText =
    'position:fixed;inset:0;z-index:1000;background:#000;cursor:pointer';
  document.body.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const cols = Math.floor(canvas.width / 16);
  const drops = Array(cols).fill(1);
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF';

  const draw = () => {
    ctx.fillStyle = 'rgba(0,0,0,.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#39ff14';
    ctx.font = '15px monospace';
    drops.forEach((y, i) => {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(ch, i * 16, y * 16);
      if (y * 16 > canvas.height && Math.random() > .975) drops[i] = 0;
      drops[i]++;
    });
  };

  const tid = setInterval(draw, 40);
  const stop = () => {
    clearInterval(tid);
    canvas.remove();
    cmdInput.focus();
  };
  canvas.addEventListener('click', stop);
  document.addEventListener('keydown', stop, { once: true });
}
</script>
</body>
</html>
